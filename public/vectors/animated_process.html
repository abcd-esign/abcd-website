<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Process — Step by Step</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  .stage {
    width: 100%;
    padding: 0;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }
  .controls {
    margin-top: 24px;
    text-align: center;
  }
  button {
    background: #1570F4;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    font-family: inherit;
  }
  button:hover { background: #0d5cd0; }

  /* ===== TIMING (37.34s loop; animation plays in first 18.67s) =====
     Standard segments: 1.8s each; Wave segment: 3.6s
     0%      - Idea (flower) lights up
     0–14.3% - Dashed line draws to Diamond                  (1.8s)
     14.3%   - Client Handoff (diamond) lights up
     14.3–28.6% - Dashed line draws to Sparkle               (1.8s)
     28.6%   - ABCD Design (sparkle) lights up
     28.6–57.1% - Rainbow wave flows across to Engineering   (3.6s)
     57.1%   - Engineering (black circle) lights up
     57.1–71.4% - Dashed line draws to Code Review           (1.8s)
     71.4%   - Code Review lights up
     71.4–85.7% - Dashed line draws to Launch                (1.8s)
     85.7%   - Launch (gold star) lights up + sparks fire
     85.7–100% - Hold until loop restart                     (1.8s)
  */

  .stage-icon {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0.2;
  }
  .icon-1 { animation: lit1 37.34s linear infinite; }
  .icon-2 { animation: lit2 37.34s linear infinite; }
  .icon-3 { animation: lit3 37.34s linear infinite; }
  .icon-4 { animation: lit4 37.34s linear infinite; }
  .icon-5 { animation: lit5 37.34s linear infinite; }
  .icon-6 { animation: lit6 37.34s linear infinite; }

  /* Percentages below are HALVED relative to the original 18.67s cycle so
     each icon's lit-up event keeps its previous wall-clock timing inside
     the new 37.34s cycle. The animation completes in the first half of
     each cycle and holds (the same end value at 100%) for the second
     half — matching the 37.34s Traditional cycle so both restart together. */
  @keyframes lit1 {
    0%             { opacity: 0.2;  transform: scale(0.85); }
    0.675%         { opacity: 1;    transform: scale(1.2); }
    1.575%, 100%   { opacity: 1;    transform: scale(1); }
  }
  @keyframes lit2 {
    0%, 2.7%       { opacity: 0.2;  transform: scale(0.85); }
    3.6%           { opacity: 1;    transform: scale(1.2); }
    4.725%, 100%   { opacity: 1;    transform: scale(1); }
  }
  @keyframes lit3 {
    0%, 5.85%      { opacity: 0.2;  transform: scale(0.85) rotate(0deg); }
    6.75%          { opacity: 1;    transform: scale(1.2) rotate(15deg); }
    8.1%, 100%     { opacity: 1;    transform: scale(1) rotate(0deg); }
  }
  @keyframes lit4 {
    0%, 12.375%    { opacity: 0.2;  transform: scale(0.85); }
    13.275%        { opacity: 1;    transform: scale(1.2); }
    14.4%, 100%    { opacity: 1;    transform: scale(1); }
  }
  @keyframes lit5 {
    0%, 15.525%    { opacity: 0.2;  transform: scale(0.85); }
    16.425%        { opacity: 1;    transform: scale(1.2); }
    17.55%, 100%   { opacity: 1;    transform: scale(1); }
  }
  @keyframes lit6 {
    0%, 18.675%    { opacity: 0.2;  transform: scale(0.85) rotate(0deg); }
    19.575%        { opacity: 1;    transform: scale(1.3) rotate(20deg); }
    20.7%, 100%    { opacity: 1;    transform: scale(1) rotate(0deg); }
  }

  /* Colorful wave lights with ABCD Design (stage 3) */
  /* Colorful wave reveals via clip-path (see #rect-wave animation) */
  .deco-wave {
    opacity: 1;
  }

  .paused * { animation-play-state: paused !important; }
</style>
